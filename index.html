<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#800020">
    <meta name="description" content="EMS Минск — справочная система для скорой медицинской помощи">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🚑%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="css/main.css">
    <title>EMS Минск</title>
</head>
<body>
    <div id="app">
        <header class="app-header">
            <button class="menu-btn" id="menuToggle" aria-label="Открыть меню">☰</button>
            <h1 id="pageTitle">Справочная система для скорой медицинской помощи</h1>
            <button class="theme-btn" id="themeToggle" aria-label="Переключить тему">🌙</button>
        </header>
        <nav class="sidebar" id="sidebar" role="navigation" aria-label="Основное меню">
            <div class="sidebar-brand">
                <span class="brand-emoji">🚑</span>
                <span class="brand-name">EMS Минск</span>
                <span class="brand-version">v1.0</span>
            </div>
            <ul class="nav-list">
                <li><a href="#/" class="nav-link active" data-section="home">🏠 Главная</a></li>
                <li><a href="#/orders" class="nav-link" data-section="orders">📋 Приказы</a></li>
                <li><a href="#/guidelines" class="nav-link" data-section="guidelines">📖 Клинические рекомендации</a></li>
                <li><a href="#/calculators" class="nav-link" data-section="calculators">🧮 Калькуляторы</a></li>
                <li><a href="#/reference" class="nav-link" data-section="reference">📚 Шпаргалки и справочная информация</a></li>
            </ul>
            <div class="sidebar-footer">
                <span class="offline-status" id="offlineStatus">🟢 Онлайн</span>
            </div>
        </nav>
        <main class="main-content" id="mainContent">
            <div id="pageContent"></div>
        </main>
    </div>

    <!-- Модальное окно для просмотра документов -->
    <div class="modal-overlay" id="docModal">
        <div class="modal-container">
            <div class="modal-header">
                <div class="modal-header-left">
                    <span class="modal-type" id="modalType">Документ</span>
                    <h2 class="modal-title" id="modalTitle">Заголовок</h2>
                </div>
                <button class="modal-close" id="modalClose" aria-label="Закрыть">✕</button>
            </div>
            <div class="modal-body">
                <div class="modal-meta" id="modalMeta"></div>
                <div class="modal-content" id="modalContent"></div>
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/db.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
