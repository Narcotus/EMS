<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#800020" />
  <meta name="description" content="EMS Минск — приказы, клинические рекомендации, калькуляторы и справочная информация для медицинских работников" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml" href="icons/icon-192.svg" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>EMS Минск</title>
  <link rel="stylesheet" href="css/md3.css" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <header class="md3-top-bar" id="topBar">
    <button class="md3-icon-btn" id="menuToggle" aria-label="Меню">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M3 6h18v2H3V6zm0 5h18v2H3v-2zm0 5h18v2H3v-2z"/></svg>
    </button>
    <h1 class="md3-top-bar-title" id="pageTitle">EMS Минск</h1>
    <button class="md3-icon-btn" id="themeToggle" aria-label="Сменить тему">
      <svg class="icon-light" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg>
      <svg class="icon-dark" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="display:none"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>

  </header>

  <nav class="md3-drawer" id="navDrawer">
    <div class="md3-drawer-header">
      <div class="md3-drawer-avatar">🚑</div>
      <div class="md3-drawer-title">EMS Минск</div>

    </div>
    <div class="md3-drawer-divider"></div>
    <a class="md3-nav-item active" data-route="home" href="#home">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3L4 9v12h5v-7h6v7h5V9l-7-6z"/></svg>
      <span>Главная</span>
    </a>
    <a class="md3-nav-item" data-route="orders" href="#orders">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 2l5 5h-5V4zM8 13h8v2H8v-2zm0 4h8v2H8v-2z"/></svg>
      <span>Приказы</span>
    </a>
    <a class="md3-nav-item" data-route="guidelines" href="#guidelines">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zM7 10h10v2H7v-2zm0 4h7v2H7v-2z"/></svg>

      <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M8 6h8M8 10h2M14 10h2M8 14h2M14 14h2M8 18h2" stroke="currentColor" stroke-width="2" fill="none"/></svg>
      <span>Калькуляторы</span>
    </a>
    <a class="md3-nav-item" data-route="reference" href="#reference">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="8"/><path d="M12 8v5M12 16h0" stroke="currentColor" stroke-width="2" fill="none"/></svg>
      <span>Справочная информация</span>
    </a>
  </nav>

  <div class="md3-scrim" id="scrim"></div>
  <main class="md3-content" id="mainContent"></main>
  <div class="md3-snackbar" id="snackbar"></div>
  <div class="md3-toast" id="toast"></div>

  <script src="js/db.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/router.js"></script>
  <script src="js/pages/home.js"></script>
  <script src="js/pages/orders.js"></script>
  <script src="js/pages/guidelines.js"></script>
  <script src="js/pages/calculators.js"></script>
  <script src="js/pages/reference.js"></script>
  <script src="js/app.js"></script>
